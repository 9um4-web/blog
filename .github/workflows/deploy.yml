name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 깃허브 저장소 코드 가져오기
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🚀 [시작 시] 빌드 및 배포 프로세스 시작 알림 전송 (Discord & Telegram)
      - name: Alert Build & Deploy Start
        run: |
          # 1. Discord 알림
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"embeds": [{"title": "🚀 빌드 및 배포 시작 (Build & Deploy Started)", "description": "GitHub Actions에서 블로그 빌드 검증 및 배포 과정을 시작합니다.\n- Commit: `${{ github.sha }}`", "color": 3447003}]}' \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"
          
          # 2. Telegram 알림
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}", "text": "🚀 *빌드 및 배포 시작 (Build & Deploy Started)*\n\nGitHub Actions에서 블로그 빌드 검증 및 배포 과정을 시작합니다.\n- Commit: `${{ github.sha }}`", "parse_mode": "Markdown"}' \
               "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"

      # 2. Node.js 빌드 환경 셋업 및 빌드 검증
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      # 여기서 빌드가 실패하면 다음 단계로 가지 않고 멈춤
      - name: Build Test
        run: npm run build > build_log.txt 2>&1

      # ❌ [빌드 실패 시] 디스코드 & 텔레그램 알림 및 로그 파일 업로드
      - name: Alert Build Failure
        if: failure()
        run: |
          # 1. 텔레그램 알림 발송 (단문 상태 알림)
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}", "text": "❌ <b>빌드 실패 (Build Error)</b>\nGitHub Actions 빌드 검증 중 에러가 발생했습니다. (디스코드에서 상세 로그 파일 확인 요망)", "parse_mode": "HTML"}' \
               "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"

          # 2. 디스코드 배포 실패 기본 알림 발송
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"embeds": [{"title": "❌ 배포 실패 (Deploy Failed)", "description": "도커 이미지 빌드가 비정상 중단되었습니다. (상세 내역은 아래 로그 카드를 참고하세요)", "color": 16711680}]}' \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"

          # 3. 디스코드 에러 요약본 엠베드 카드 발송 (마지막 15줄을 jq로 안전하게 이스케이프 처리하여 전송)
          SUMMARY=$(tail -n 15 build_log.txt)
          JSON_PAYLOAD=$(jq -n --arg summary "$SUMMARY" '{
            embeds: [{
              title: "❌ 빌드 실패 상세 내역 (Build Error Detail)",
              description: ("**에러 요약:**\n```bash\n" + $summary + "\n```"),
              color: 16711680
            }]
          }')
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$JSON_PAYLOAD" \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"

          # 4. 마지막으로 전체 빌드 로그 파일 업로드
          curl -F "files[0]=@build_log.txt" "${{ secrets.DISCORD_WEBHOOK_URL }}"

      # 🐳 Docker Buildx 및 로그인 설정 (빌드 통과 시만 실행)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🐳 blog-app 이미지 빌드 및 GHCR에 푸시
      - name: Build and push blog-app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: |
            ghcr.io/9um4-web/blog-app:latest
            ghcr.io/9um4-web/blog-app:${{ github.sha }}

      # 🐳 blog-migrate 이미지 빌드 및 GHCR에 푸시
      - name: Build and push blog-migrate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: build
          push: true
          tags: |
            ghcr.io/9um4-web/blog-migrate:latest
            ghcr.io/9um4-web/blog-migrate:${{ github.sha }}

      # 3. [빌드 통과 시] 우리 서버로 배포 웹훅 송신 (curl)
      - name: Trigger Webhook Deploy
        id: trigger_deploy
        run: |
          PAYLOAD='{"ref":"refs/heads/main"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET_SIGNATURE }}" | cut -d' ' -f2)
          
          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -H "${{ secrets.CUSTOM_AUTH_HEADER_NAME }}: ${{ secrets.WEBHOOK_SECRET_SIGNATURE }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -d "$PAYLOAD" \
            "https://webhook-blog.9um4.com/deploy-webhook")
          
          if [ "$RESPONSE_CODE" -ne 202 ] && [ "$RESPONSE_CODE" -ne 200 ]; then
            echo "Webhook trigger failed with status $RESPONSE_CODE"
            exit 1
          fi

      # ❌ [웹훅 전송 실패 시] 서버 접속 불가 경고 전송
      # ⚠️ failure()를 더해 이전 단계가 실패 상태더라도 이 경고 단계가 강제 실행되도록 보장했습니다.
      - name: Alert Server Connection Failure
        if: failure() && steps.trigger_deploy.outcome == 'failure'
        run: |
          # 1. Discord 알림
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"embeds": [{"title": "⚠️ 서버 연결 실패", "description": "웹훅 신호를 서버로 보냈으나 연결할 수 없습니다. (서버 다운 혹은 502 에러)", "color": 16753920}]}' \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"

          # 2. Telegram 알림
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}", "text": "⚠️ *서버 연결 실패*\n\n웹훅 신호를 서버로 보냈으나 연결할 수 없습니다. (서버 다운 혹은 502 에러)", "parse_mode": "Markdown"}' \
               "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"