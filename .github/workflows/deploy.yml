name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 깃허브 저장소 코드 가져오기
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🚀 [시작 시] 빌드 및 배포 프로세스 시작 알림 전송 (Discord & Telegram)
      - name: Alert Build & Deploy Start
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 커밋 메시지는 외부(사용자) 입력이라 run: 스크립트 문자열에 ${{ }}로 직접 넣으면
          # 스크립트 인젝션 위험이 있다 — env로 넘겨서 셸이 값 그대로(코드로 안 해석) 쓰게 한다.
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          source .github/scripts/notify.sh

          SHORT_SHA="${GITHUB_SHA:0:7}"
          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          COMMIT_MSG_LINE="$(head -n1 <<< "$COMMIT_MESSAGE")"

          discord_embed "🚀 빌드 및 배포 시작 (Build & Deploy Started)" \
            "GitHub Actions에서 블로그 빌드 검증 및 배포 과정을 시작합니다.\nCommit: [\`${SHORT_SHA}\`](${COMMIT_URL}) - ${COMMIT_MSG_LINE}" \
            3447003
          telegram_text "🚀 *빌드 및 배포 시작 (Build & Deploy Started)*\n\nGitHub Actions에서 블로그 빌드 검증 및 배포 과정을 시작합니다.\n\nCommit: [\`${SHORT_SHA}\`](${COMMIT_URL}) - ${COMMIT_MSG_LINE}"

      # 2. Node.js 빌드 환경 셋업 및 빌드 검증
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      # 여기서 빌드가 실패하면 다음 단계로 가지 않고 멈춤
      - name: Build Test
        run: npm run build > build_log.txt 2>&1

      # ❌ [빌드 실패 시] 디스코드 & 텔레그램 알림 및 로그 파일 업로드
      - name: Alert Build Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          source .github/scripts/notify.sh

          # 1. 텔레그램 단문 상태 알림
          telegram_text "❌ <b>빌드 실패 (Build Error)</b>\nGitHub Actions 빌드 검증 중 에러가 발생했습니다. (디스코드에서 상세 로그 파일 확인 요망)" "HTML"

          # 2. 디스코드 배포 실패 기본 알림
          discord_embed "❌ 배포 실패 (Deploy Failed)" "도커 이미지 빌드가 비정상 중단되었습니다. (상세 내역은 아래 로그 카드를 참고하세요)" 16711680

          # 3. 디스코드 에러 요약본 (마지막 15줄)
          SUMMARY=$(tail -n 15 build_log.txt)
          discord_embed "❌ 빌드 실패 상세 내역 (Build Error Detail)" "**에러 요약:**\n\`\`\`bash\n${SUMMARY}\n\`\`\`" 16711680

          # 4. 전체 빌드 로그 파일 업로드
          discord_file build_log.txt

      # 🐳 Docker Buildx 및 로그인 설정 (빌드 통과 시만 실행)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🐳 blog-app 이미지 빌드 및 GHCR에 푸시
      - name: Build and push blog-app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: |
            ghcr.io/9um4-web/blog-app:latest
            ghcr.io/9um4-web/blog-app:${{ github.sha }}

      # 🔍 blog-app 이미지에 시크릿/취약점이 섞여 들어가지 않았는지 검사.
      # GHCR public 전환을 전제로 두는 안전장치라 매 빌드마다 자동 실행한다.
      # exit-code는 우선 0(경고만)으로 시작 — 오탐 없이 안정화되면 1로 올려서 실패 처리할 것.
      - name: Scan blog-app image (secrets & vulnerabilities)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/9um4-web/blog-app:${{ github.sha }}
          scanners: "vuln,secret"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: table
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      # 🐳 blog-migrate 이미지 빌드 및 GHCR에 푸시
      - name: Build and push blog-migrate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: build
          push: true
          tags: |
            ghcr.io/9um4-web/blog-migrate:latest
            ghcr.io/9um4-web/blog-migrate:${{ github.sha }}

      # 🔍 blog-migrate 이미지도 동일하게 검사 (build 스테이지라 소스/의존성 전체를 포함하므로 더 중요)
      - name: Scan blog-migrate image (secrets & vulnerabilities)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/9um4-web/blog-migrate:${{ github.sha }}
          scanners: "vuln,secret"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: table
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      # 3. [빌드 통과 시] 우리 서버로 배포 트리거 — Cloudflare Tunnel의 SSH ingress 경유.
      #
      # ⚠️ Cloudflare 무료 플랜의 Bot Fight Mode는 WAF Custom Rule로 스킵이 안 되는
      # 구조적 제약이 있어(Ruleset Engine 밖에서 동작), 공개 HTTPS 웹훅으로는 GitHub
      # Actions의 요청이 계속 managed_challenge에 막혔다. Bot Fight Mode는 HTTP만
      # 검사하므로, SSH(Cloudflare Tunnel 터널링)로 우회한다.
      #
      # 서버에 도달한 뒤 실행되는 명령은 authorized_keys의 forced command로 고정돼 있어서
      # (~/blog-deploy/trigger-deploy.sh) 이 SSH 키가 새더라도 공격자가 임의 명령을 못 돌리고
      # 딱 그 스크립트만 실행할 수 있다. HMAC 시크릿도 서버의 .env에서만 읽으므로 GitHub
      # Actions 쪽엔 웹훅 시크릿을 따로 등록할 필요가 없다(SSH 키/서비스 토큰만 있으면 됨).
      # Cloudflare/서버 쪽 설정 절차는 docs/ssh-tunnel-deploy-trigger.md 참고.
      - name: Install cloudflared
        run: |
          curl -sL -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/cloudflared

      - name: Trigger Deploy via SSH over Cloudflare Tunnel
        id: trigger_deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          CF_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_SERVICE_TOKEN_ID }}
          CF_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_SERVICE_TOKEN_SECRET }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOSTNAME }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h --service-token-id $CF_SERVICE_TOKEN_ID --service-token-secret $CF_SERVICE_TOKEN_SECRET
          EOF
          chmod 600 ~/.ssh/config

          # 명령을 안 붙이는 이유: 서버 쪽 authorized_keys가 forced command로
          # trigger-deploy.sh만 실행하도록 고정해뒀기 때문 — 뭘 보내도 그 스크립트만 돈다.
          ssh deploy-target

      # ❌ [웹훅 전송 실패 시] 서버 접속 불가 경고 전송
      # ⚠️ failure()를 더해 이전 단계가 실패 상태더라도 이 경고 단계가 강제 실행되도록 보장했습니다.
      - name: Alert Server Connection Failure
        if: failure() && steps.trigger_deploy.outcome == 'failure'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          source .github/scripts/notify.sh
          discord_embed "⚠️ 서버 연결 실패" "웹훅 신호를 서버로 보냈으나 연결할 수 없습니다. (서버 다운 혹은 502 에러)" 16753920
          telegram_text "⚠️ *서버 연결 실패*\n\n웹훅 신호를 서버로 보냈으나 연결할 수 없습니다. (서버 다운 혹은 502 에러)"