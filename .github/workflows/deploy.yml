name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 깃허브 저장소 코드 가져오기
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🚀 [시작 시] 빌드 및 배포 프로세스 시작 알림 전송 (Discord & Telegram)
      - name: Alert Build & Deploy Start
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          source .github/scripts/notify.sh
          discord_embed "🚀 빌드 및 배포 시작 (Build & Deploy Started)" \
            "GitHub Actions에서 블로그 빌드 검증 및 배포 과정을 시작합니다.\n- Commit: \`${{ github.sha }}\`" \
            3447003
          telegram_text "🚀 *빌드 및 배포 시작 (Build & Deploy Started)*\n\nGitHub Actions에서 블로그 빌드 검증 및 배포 과정을 시작합니다.\n- Commit: \`${{ github.sha }}\`"

      # 2. Node.js 빌드 환경 셋업 및 빌드 검증
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      # 여기서 빌드가 실패하면 다음 단계로 가지 않고 멈춤
      - name: Build Test
        run: npm run build > build_log.txt 2>&1

      # ❌ [빌드 실패 시] 디스코드 & 텔레그램 알림 및 로그 파일 업로드
      - name: Alert Build Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          source .github/scripts/notify.sh

          # 1. 텔레그램 단문 상태 알림
          telegram_text "❌ <b>빌드 실패 (Build Error)</b>\nGitHub Actions 빌드 검증 중 에러가 발생했습니다. (디스코드에서 상세 로그 파일 확인 요망)" "HTML"

          # 2. 디스코드 배포 실패 기본 알림
          discord_embed "❌ 배포 실패 (Deploy Failed)" "도커 이미지 빌드가 비정상 중단되었습니다. (상세 내역은 아래 로그 카드를 참고하세요)" 16711680

          # 3. 디스코드 에러 요약본 (마지막 15줄)
          SUMMARY=$(tail -n 15 build_log.txt)
          discord_embed "❌ 빌드 실패 상세 내역 (Build Error Detail)" "**에러 요약:**\n\`\`\`bash\n${SUMMARY}\n\`\`\`" 16711680

          # 4. 전체 빌드 로그 파일 업로드
          discord_file build_log.txt

      # 🐳 Docker Buildx 및 로그인 설정 (빌드 통과 시만 실행)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🐳 blog-app 이미지 빌드 및 GHCR에 푸시
      - name: Build and push blog-app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: |
            ghcr.io/9um4-web/blog-app:latest
            ghcr.io/9um4-web/blog-app:${{ github.sha }}

      # 🔍 blog-app 이미지에 시크릿/취약점이 섞여 들어가지 않았는지 검사.
      # GHCR public 전환을 전제로 두는 안전장치라 매 빌드마다 자동 실행한다.
      # exit-code는 우선 0(경고만)으로 시작 — 오탐 없이 안정화되면 1로 올려서 실패 처리할 것.
      - name: Scan blog-app image (secrets & vulnerabilities)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/9um4-web/blog-app:${{ github.sha }}
          scanners: "vuln,secret"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: table
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      # 🐳 blog-migrate 이미지 빌드 및 GHCR에 푸시
      - name: Build and push blog-migrate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: build
          push: true
          tags: |
            ghcr.io/9um4-web/blog-migrate:latest
            ghcr.io/9um4-web/blog-migrate:${{ github.sha }}

      # 🔍 blog-migrate 이미지도 동일하게 검사 (build 스테이지라 소스/의존성 전체를 포함하므로 더 중요)
      - name: Scan blog-migrate image (secrets & vulnerabilities)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/9um4-web/blog-migrate:${{ github.sha }}
          scanners: "vuln,secret"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: table
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      # 3. [빌드 통과 시] 우리 서버로 배포 웹훅 송신 (curl)
      #
      # ⚠️ HMAC 서명과 커스텀 인증 헤더는 서로 다른 시크릿을 쓴다(WEBHOOK_HMAC_SECRET /
      # WEBHOOK_AUTH_TOKEN). 예전엔 둘 다 WEBHOOK_SECRET_SIGNATURE 하나를 재사용했는데,
      # 그러면 두 계층 인증이 사실상 단일 시크릿과 같아진다 — 헤더 값(평문)이 access log 등에
      # 남아 유출되면 서명 위조까지 가능해지는 구조. 두 값을 분리해 한쪽이 새도 다른 쪽 인증
      # 계층은 살아있게 한다.
      #
      # 적용 전 GitHub 저장소 Settings > Secrets에서:
      #   1. 새 시크릿 WEBHOOK_AUTH_TOKEN 생성 (WEBHOOK_SECRET_SIGNATURE와 다른 값으로)
      #   2. WEBHOOK_SECRET_SIGNATURE는 WEBHOOK_HMAC_SECRET으로 이름만 바꿔 유지(값은 그대로 둬도 됨)
      # 서버 측(server.js)도 헤더 검증 값을 WEBHOOK_AUTH_TOKEN 기준으로 바꿔야 한다 — 이 저장소
      # 밖에 있는 파일이라 여기서 자동으로 반영되지 않음. docs/server-side-followups.md 참고.
      - name: Trigger Webhook Deploy
        id: trigger_deploy
        run: |
          PAYLOAD='{"ref":"refs/heads/main"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_HMAC_SECRET }}" | cut -d' ' -f2)

          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -H "${{ secrets.CUSTOM_AUTH_HEADER_NAME }}: ${{ secrets.WEBHOOK_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -d "$PAYLOAD" \
            "https://webhook-blog.9um4.com/deploy-webhook")

          if [ "$RESPONSE_CODE" -ne 202 ] && [ "$RESPONSE_CODE" -ne 200 ]; then
            echo "Webhook trigger failed with status $RESPONSE_CODE"
            exit 1
          fi

      # ❌ [웹훅 전송 실패 시] 서버 접속 불가 경고 전송
      # ⚠️ failure()를 더해 이전 단계가 실패 상태더라도 이 경고 단계가 강제 실행되도록 보장했습니다.
      - name: Alert Server Connection Failure
        if: failure() && steps.trigger_deploy.outcome == 'failure'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          source .github/scripts/notify.sh
          discord_embed "⚠️ 서버 연결 실패" "웹훅 신호를 서버로 보냈으나 연결할 수 없습니다. (서버 다운 혹은 502 에러)" 16753920
          telegram_text "⚠️ *서버 연결 실패*\n\n웹훅 신호를 서버로 보냈으나 연결할 수 없습니다. (서버 다운 혹은 502 에러)"