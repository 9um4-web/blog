# 운영 배포용 (Linux 서버). 개발용은 docker-compose.dev.yml 참조.
#
# 필요 환경변수 (.env 또는 셸에서 주입):
#   POSTGRES_PASSWORD, SESSION_SECRET, ADMIN_PASSWORD_HASH

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD를 설정하세요}
      POSTGRES_DB: blog
    volumes:
      - blog_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 앱 시작 전에 마이그레이션을 1회 실행하는 서비스
  migrate:
    build:
      context: .
      target: build
    command: npx drizzle-kit migrate
    environment:
      DATABASE_URL: postgres://blog:${POSTGRES_PASSWORD}@db:5432/blog
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://blog:${POSTGRES_PASSWORD}@db:5432/blog
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET를 설정하세요}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH를 설정하세요}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  blog_pgdata:
